<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>複雜度分析</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>複雜度分析</h1>
    <table>
        <thead>
            <tr>
                <th>排序演算法</th>
                <th>時間複雜度 (最壞)</th>
                <th>時間複雜度 (平均)</th>
                <th>時間複雜度 (最好)</th>
                <th>空間複雜度</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>冒泡排序</td>
                <td>O(n²)</td>
                <td>O(n²)</td>
                <td>O(n)</td>
                <td>O(1)</td>
            </tr>
            <tr>
                <td>插入排序</td>
                <td>O(n²)</td>
                <td>O(n²)</td>
                <td>O(n)</td>
                <td>O(1)</td>
            </tr>
            <tr>
                <td>選擇排序</td>
                <td>O(n²)</td>
                <td>O(n²)</td>
                <td>O(n²)</td>
                <td>O(1)</td>
            </tr>
            <tr>
                <td>快速排序</td>
                <td>O(n²)</td>
                <td>O(n log n)</td>
                <td>O(n log n)</td>
                <td>O(log n)</td>
            </tr>
            <tr>
                <td>合併排序</td>
                <td>O(n log n)</td>
                <td>O(n log n)</td>
                <td>O(n log n)</td>
                <td>O(n)</td>
            </tr>
        </tbody>
    </table>
    <p><a href="index.html">返回首頁</a></p>
</body>
</html>
